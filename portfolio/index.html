<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="header-inner">
            <div class="logo">Mukumoto Ryo</div>

            <nav>
                <ul>
                    <li><a href="#profile">Profile</a></li>
                    <li><a href="#works">Works</a></li>
                </ul>
            </nav>
        </div>
    </header>


    <!-- Top -->
    <section class="top">

        <h1>Portfolio</h1>

    </section>


    <!-- Profile -->
    <section id="profile" class="profile">

        <h2>Profile</h2>

        <div class="profile-box">

            <div class="profile-img">
                <img src="images/profile.jpg" alt="">
            </div>

            <div class="profile-text">
                <p>
                   <strong>Name</strong><br>
                   <span class="text">  椋本 凌　Mukumoto Ryo</span>
                </p>

                <p>
                    <strong>Skill</strong><br>
                    <span class="text">   Illustrator</span>
                </p>

                <p>
                    <strong>Hobby</strong><br>
                    <span class="text">   映画鑑賞・ゲーム</span>
                </p>

            </div>

        </div>

    </section>


    <!-- Works -->
    <section id="works" class="works">

        <h2>Works</h2>

        <div class="work-list">

            <div class="work work1">
                <video autoplay muted loop playsinline>
                <source src="images/work1.mp4" type="video/mp4">
            このブラウザは動画に対応していません。
                </video>
            </div> 
            <div class="work">
                <img src="images/work2.jpg" alt="">
            </div>

            <div class="work">
                <img src="images/work3.jpg" alt="">
            </div>

            <div class="work vertical">
                <img src="images/work5.jpg" alt="">
            </div>

            <div class="work vertical">
                <video autoplay muted loop playsinline>
                <source src="images/work4.mp4" type="video/mp4">
            </video>
        </div>

    </section>

</body>
</html>
